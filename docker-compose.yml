services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genesis_app
    ports:
      - "8080:80"
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: genesis
      DB_USERNAME: genesis
      DB_PASSWORD: genesis123
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: genesis_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: genesis
      MYSQL_USER: genesis
      MYSQL_PASSWORD: genesis123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: genesis_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: genesis
      PMA_PASSWORD: genesis123
    depends_on:
      - db

volumes:
  db_data:
